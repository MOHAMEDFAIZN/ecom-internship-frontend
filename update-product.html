<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Update Product</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #1e1e1e;
        color: #fff;
      }

      /* Navbar */
      .navbar {
        background: #000;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
      }

      .nav-left a {
        color: #fff;
        text-decoration: none;
        font-size: 15px;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .nav-right input {
        padding: 8px 12px;
        border-radius: 5px;
        border: none;
        outline: none;
        width: 200px;
      }

      /* Page container */
      .container {
        max-width: 1100px;
        margin: 50px auto;
        padding: 30px;
        background: linear-gradient(145deg, #2a2a2a, #1c1c1c);
        border-radius: 12px;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 500;
      }

      /* Form */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group.full {
        grid-column: span 2;
      }

      label {
        margin-bottom: 8px;
        font-size: 14px;
        color: #ddd;
      }

      input,
      select {
        padding: 12px;
        border-radius: 6px;
        border: none;
        outline: none;
        font-size: 15px;
      }

      input[type="number"] {
        appearance: auto;
      }

      /* Image preview */
      .image-preview {
        margin-top: 10px;
        background: #111;
        border-radius: 8px;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 220px;
      }

      .image-preview img {
        max-height: 100%;
        max-width: 100%;
        border-radius: 8px;
      }

      /* Button */
      .btn {
        margin-top: 30px;
        width: 100%;
        padding: 14px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #4caf50;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #43a047;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <div class="nav-left">
        <div class="logo">E-COM</div>
        <a href="#">Home</a>
        <a href="#">Add Product</a>
        <a href="#">Categories <i class="fa fa-caret-down"></i></a>
      </div>

      <div class="nav-right">
        <i class="fa-solid fa-moon"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <input type="text" placeholder="Search" />
      </div>
    </div>

    <!-- Main Container -->
    <div class="container">
      <h1>Update Product</h1>

      <form id="productForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Name</label>
            <input type="text" value="samsung galaxy s24 ultra" />
          </div>

          <div class="form-group">
            <label>Brand</label>
            <input type="text" value="Samsung" />
          </div>

          <div class="form-group full">
            <label>Description</label>
            <input type="text" value="the best smartphone in the world now" />
          </div>

          <div class="form-group">
            <label>Price</label>
            <input type="number" value="9999" />
          </div>

          <div class="form-group">
            <label>Category</label>
            <select>
              <option>Select category</option>
              <option>Mobile</option>
              <option>Laptop</option>
              <option>Accessories</option>
            </select>
          </div>

          <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" value="6" />
          </div>

          <div class="form-group">
            <label>Image</label>
            <input type="file" id="imageInput" accept="image/*" />
            <div class="image-preview">
              <img
                id="preview"
                src="https://images.samsung.com/is/image/samsung/p6pim/in/sm-s928bzkeinu/gallery/in-galaxy-s24-ultra-492657-sm-s928bzkeinu-540932020?$650_519_PNG$"
                alt="Product Image"
              />
            </div>
          </div>
        </div>

        <button class="btn">Update Product</button>
      </form>
    </div>

    <script>
      const imageInput = document.getElementById("imageInput");
      const preview = document.getElementById("preview");

      imageInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = () => (preview.src = reader.result);
          reader.readAsDataURL(file);
        }
      });
    </script>
  </body>
</html>
