<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>E-COM | Products</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #1e1e1e;
        color: #fff;
      }

      /* Navbar */
      .navbar {
        background: #000;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
      }

      .nav-left a {
        color: #fff;
        text-decoration: none;
        font-size: 15px;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .nav-right input {
        padding: 8px 12px;
        border-radius: 5px;
        border: none;
        width: 200px;
      }

      /* Main layout */
      .main {
        padding: 40px;
        display: flex;
        align-items: flex-start;
      }

      /* Product card */
      .card {
        width: 280px;
        background: #2b2b2b;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .card img {
        width: 100%;
        background: #fff;
        padding: 10px;
        border-radius: 12px;
        margin-bottom: 15px;
      }

      .card h3 {
        font-size: 20px;
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      .card .brand {
        font-style: italic;
        color: #bbb;
        margin-bottom: 12px;
      }

      .divider {
        height: 1px;
        background: #555;
        margin: 15px 0;
      }

      .price {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 25px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        background: #2da8ff;
        color: #fff;
        transition: 0.3s;
      }

      .btn:hover {
        background: #1b8fe0;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <div class="nav-left">
        <div class="logo">E-COM</div>
        <a href="">Home</a>
        <a href="add-product.html">Add Product</a>
        <a href="#">Categories <i class="fa fa-caret-down"></i></a>
      </div>

      <div class="nav-right">
        <i class="fa-solid fa-moon"></i>
        <span
          ><i class="fa-solid fa-cart-shopping"></i
          ><a href="cart.html"> Cart</a></span
        >
        <input type="text" placeholder="Search" />
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Product Card -->
      <div class="card">
        <div onclick="goToProductPage()">
          <img
            src="https://images.samsung.com/is/image/samsung/p6pim/in/sm-s928bzkeinu/gallery/in-galaxy-s24-ultra-492657-sm-s928bzkeinu-540932020?$650_519_PNG$"
          />

          <h3>Samsung Galaxy<br />S24 Ultra</h3>
          <div class="brand">~ Samsung</div>

          <div class="divider"></div>

          <div class="price">₹ 9999</div>
        </div>

        <button class="btn" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>

    <script>
      function goToProductPage() {
        window.location.href = "product-details.html";
      }

      function addToCart() {
        // prevent card click
        window.location.href = "cart.html";
      }
    </script>
  </body>
</html>
