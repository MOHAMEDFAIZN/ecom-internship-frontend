<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping Bag</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #1e1e1e;
        color: #fff;
      }

      /* Navbar */
      .navbar {
        background: #000;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
      }

      .nav-left a {
        color: #fff;
        text-decoration: none;
        font-size: 15px;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .nav-right input {
        padding: 8px 12px;
        border-radius: 5px;
        border: none;
        width: 200px;
      }

      /* Cart container */
      .cart-container {
        max-width: 1100px;
        margin: 50px auto;
        padding: 40px;
        background: linear-gradient(145deg, #2a2a2a, #1c1c1c);
        border-radius: 14px;
      }

      .cart-title {
        font-size: 24px;
        margin-bottom: 20px;
      }

      hr {
        border: none;
        border-top: 1px solid #555;
        margin: 20px 0;
      }

      /* Cart item */
      .cart-item {
        display: grid;
        grid-template-columns: 120px 1fr 200px;
        align-items: center;
        gap: 20px;
      }

      .cart-item img {
        width: 100px;
        background: #fff;
        padding: 10px;
        border-radius: 8px;
      }

      .item-info h3 {
        font-size: 18px;
        margin-bottom: 5px;
      }

      .item-info p {
        color: #ccc;
        font-size: 14px;
      }

      .item-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 15px;
      }

      .qty-btn {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 18px;
        background: #fff;
        color: #000;
      }

      .qty {
        width: 40px;
        text-align: center;
        background: #fff;
        color: #000;
        padding: 5px;
        border-radius: 4px;
      }

      .price {
        font-size: 18px;
        min-width: 80px;
        text-align: right;
      }

      .delete {
        cursor: pointer;
        color: #fff;
        font-size: 18px;
      }

      /* Total section */
      .total {
        text-align: center;
        font-size: 20px;
        margin: 25px 0 15px;
      }

      .checkout {
        width: 100%;
        padding: 14px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: #0d6efd;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
      }

      .checkout:hover {
        background: #0b5ed7;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <div class="nav-left">
        <div class="logo">E-COM</div>
        <a href="index.html">Home</a>
        <a href="add-product.html">Add Product</a>
        <a href="#">Categories <i class="fa fa-caret-down"></i></a>
      </div>

      <div class="nav-right">
        <i class="fa-solid fa-moon"></i>
        <span><i class="fa-solid fa-cart-shopping"></i> Cart</span>
        <input type="text" placeholder="Search" />
      </div>
    </div>

    <!-- Cart -->
    <div class="cart-container">
      <div class="cart-title">Shopping Bag</div>
      <hr />

      <div class="cart-item">
        <img
          src="https://images.samsung.com/is/image/samsung/p6pim/in/sm-s928bzkeinu/gallery/in-galaxy-s24-ultra-492657-sm-s928bzkeinu-540932020?$650_519_PNG$"
        />

        <div class="item-info">
          <h3>Samsung</h3>
          <p>samsung galaxy s24 ultra</p>
        </div>

        <div class="item-actions">
          <button class="qty-btn" onclick="decrease()">−</button>
          <div class="qty" id="qty">1</div>
          <button class="qty-btn" onclick="increase()">+</button>
          <div class="price">$<span id="price">9999</span></div>
          <i class="fa-solid fa-trash delete" onclick="removeItem()"></i>
        </div>
      </div>

      <hr />

      <div class="total">Total: $<span id="total">9999</span></div>

      <button class="checkout" onclick="checkout()">Checkout</button>
    </div>

    <script>
      let quantity = 1;
      const unitPrice = 9999;

      function updateTotal() {
        document.getElementById("price").innerText = unitPrice * quantity;
        document.getElementById("total").innerText = unitPrice * quantity;
        document.getElementById("qty").innerText = quantity;
      }
      function goToProductPage() {
        window.location.href = "product-details.html";
      }
      function checkout() {
        alert("Proceeding to checkout!");
        window.location.href = "index.html";
      }
      function increase() {
        quantity++;
        updateTotal();
      }

      function decrease() {
        if (quantity > 1) {
          quantity--;
          updateTotal();
        }
      }

      function removeItem() {
        if (confirm("Remove this item from cart?")) {
          document.querySelector(".cart-item").remove();
          document.getElementById("total").innerText = "0";
        }
      }
    </script>
  </body>
</html>
